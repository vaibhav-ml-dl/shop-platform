<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Shop Platform</title>
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <main class="auth-shell auth-shell--wide">
    <section class="auth-panel" aria-labelledby="register-title">
      <a class="auth-brand" href="index.html" aria-label="Shop Platform home">
        <span class="auth-brand__mark" aria-hidden="true">SP</span>
        <span>Shop Platform</span>
      </a>

      <div class="auth-copy">
        <p class="auth-copy__eyebrow">Create account</p>
        <h1 id="register-title">Register as a customer or shop owner.</h1>
        <p>Choose the account type that matches how you want to use the platform.</p>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Registration type">
        <button class="auth-tab auth-tab--active" type="button" role="tab" aria-selected="true" aria-controls="user-register-panel" data-register-tab="user">Register as User</button>
        <button class="auth-tab" type="button" role="tab" aria-selected="false" aria-controls="owner-register-panel" data-register-tab="owner">Register as Shop Owner</button>
      </div>

      <!-- User registration form. Backend submission will be connected later. -->
      <form class="auth-form" id="user-register-panel" data-register-panel="user" data-auth-form>
        <div class="form-field">
          <label for="user-name">Name</label>
          <input id="user-name" name="name" type="text" autocomplete="name" placeholder="Your full name">
        </div>

        <div class="form-field">
          <label for="user-contact">Phone or email</label>
          <input id="user-contact" name="contact" type="text" autocomplete="email" placeholder="you@example.com">
        </div>

        <div class="form-field">
          <label for="user-password">Password</label>
          <div class="password-field">
            <input id="user-password" name="password" type="password" autocomplete="new-password" placeholder="Create password">
            <button type="button" data-password-toggle aria-label="Show password">Show</button>
          </div>
        </div>

        <button class="auth-submit" type="submit">Register as User</button>
      </form>

      <!-- Shop owner registration uses the same form components with owner fields. -->
      <form class="auth-form is-hidden" id="owner-register-panel" data-register-panel="owner" data-auth-form>
        <div class="form-grid">
          <div class="form-field">
            <label for="owner-name">Owner name</label>
            <input id="owner-name" name="ownerName" type="text" autocomplete="name" placeholder="Owner full name">
          </div>

          <div class="form-field">
            <label for="shop-name">Shop name</label>
            <input id="shop-name" name="shopName" type="text" placeholder="Business name">
          </div>
        </div>

        <div class="form-grid">
          <div class="form-field">
            <label for="shop-category">Category</label>
            <select id="shop-category" name="category">
              <option value="">Select category</option>
              <option value="grocery">Grocery</option>
              <option value="electronics">Electronics</option>
              <option value="fashion">Fashion</option>
              <option value="restaurant">Restaurant</option>
              <option value="services">Services</option>
            </select>
          </div>

          <div class="form-field">
            <label for="shop-location">Location</label>
            <input id="shop-location" name="location" type="text" placeholder="Area or city">
          </div>
        </div>

        <div class="form-field">
          <label for="shop-phone">Phone</label>
          <input id="shop-phone" name="phone" type="tel" autocomplete="tel" placeholder="Business phone number">
        </div>

        <div class="form-field">
          <label for="owner-password">Password</label>
          <div class="password-field">
            <input id="owner-password" name="password" type="password" autocomplete="new-password" placeholder="Create password">
            <button type="button" data-password-toggle aria-label="Show password">Show</button>
          </div>
        </div>

        <button class="auth-submit" type="submit">Register Shop Owner</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="../js/auth.js"></script>
</body>
</html>
